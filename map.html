<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Live Location Tracking</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { width: 350px; height: 650px; background: white; border-radius: 30px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative; display: flex; flex-direction: column; }
        
        #map { flex-grow: 1; width: 100%; z-index: 1; }
        
        .map-btn { position: absolute; z-index: 1000; background: white; color: #ff1493; border: none; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .location-btn { top: 20px; right: 20px; width: 45px; height: 45px; font-size: 20px; }
        
        .bottom-float-btn { position: absolute; bottom: 100px; z-index: 1000; width: 55px; height: 55px; background: #ffb6c1; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; border: 2px solid white; cursor: pointer; }
        .left-float { left: 20px; }
        
        .nav-bar { background: #ff85a2; display: flex; justify-content: space-around; align-items: center; padding: 15px 0; z-index: 1001; }
        .nav-item { background: white; width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #ff1493; font-size: 18px; cursor: pointer; text-decoration: none; }
        .nav-item.active { border: 2.5px solid #ff1493; }
        .nav-item.alert { color: red; font-size: 22px; }
    </style>
</head>
<body>

    <div class="card">
        <button class="map-btn location-btn" id="recenterBtn"><i class="fas fa-location-arrow"></i></button>

        <div id="map"></div>

        <div class="bottom-float-btn left-float" onclick="triggerEmergency()"><i class="fas fa-exclamation-triangle"></i></div>
       
        <div class="nav-bar">
            <div class="nav-item alert" onclick="triggerEmergency()"><i class="fas fa-exclamation-circle"></i></div>
            <a href="tel:112" class="nav-item"><i class="fas fa-phone-alt"></i></a>
            <a href="home.html" class="nav-item active"><i class="fas fa-map"></i></a>
            <a href="info.html" class="nav-item"><i class="fas fa-book-open"></i></a>
            <a href="profile.html" class="nav-item"><i class="fas fa-user"></i></a>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBBecl7Q3CN8K-lh3booKDNKDj-iA5BN6w",
            authDomain: "yash-a7421.firebaseapp.com",
            projectId: "yash-a7421",
            storageBucket: "yash-a7421.firebasestorage.app",
            messagingSenderId: "163386398931",
            appId: "1:163386398931:web:f686bc5041ea76a18b1c26"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Initialize Map with a neutral view
        var map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        var pinkIcon = L.divIcon({
            className: 'custom-div-icon',
            html: "<div style='background-color:#ff1493; width:20px; height:20px; border-radius:50%; border:3px solid white; box-shadow: 0 0 15px rgba(255, 20, 147, 0.7);'></div>",
            iconSize: [20, 20], iconAnchor: [10, 10]
        });

        var userMarker, currentLat, currentLng, currentUser, watchId;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Reset state for new user
                if (userMarker) { map.removeLayer(userMarker); userMarker = null; }
                if (watchId) navigator.geolocation.clearWatch(watchId);
                
                currentUser = user;
                startTracking();
            } else {
                window.location.href = "index.html";
            }
        });

        function startTracking() {
            if (navigator.geolocation) {
                // 'watchPosition' is better for live tracking than 'getCurrentPosition'
                watchId = navigator.geolocation.watchPosition((position) => {
                    currentLat = position.coords.latitude;
                    currentLng = position.coords.longitude;

                    console.log("Current Location:", currentLat, currentLng);

                    if (userMarker) {
                        userMarker.setLatLng([currentLat, currentLng]);
                    } else {
                        userMarker = L.marker([currentLat, currentLng], {icon: pinkIcon}).addTo(map)
                                     .bindPopup("You are here").openPopup();
                        // Focus on user for the first time
                        map.setView([currentLat, currentLng], 17);
                    }
                }, (err) => {
                    console.error("GPS Error:", err);
                    alert("Please enable GPS/Location to show your current position.");
                }, { 
                    enableHighAccuracy: true, // Uses GPS for meter-level accuracy
                    maximumAge: 0, 
                    timeout: 10000 
                });
            } else {
                alert("Geolocation not supported.");
            }
        }

        async function getEmergencyContacts(uid) {
            try {
                const userDoc = await getDoc(doc(db, "users", uid));
                return userDoc.exists() ? (userDoc.data().emergency_contacts || []) : [];
            } catch (e) { return []; }
        }

        window.triggerEmergency = async function() {
            if (!currentLat || !currentLng) return alert("Waiting for live GPS... please stay in an open area.");

            const contacts = await getEmergencyContacts(currentUser.uid);
            if (contacts.length === 0) return alert("Please add emergency contacts in your profile first!");

            try {
                await setDoc(doc(db, "emergency_alerts", currentUser.uid), {
                    sender_name: currentUser.displayName || "User",
                    sender_email: currentUser.email,
                    location: { lat: currentLat, lng: currentLng },
                    timestamp: serverTimestamp(),
                    status: "ACTIVE"
                });
                alert(`SOS Alert Sent! 🚨\nLocation sent to ${contacts.length} contacts.`);
            } catch (e) { alert("Error: " + e.message); }
        };

        // Recenter Button
        document.getElementById('recenterBtn').onclick = () => {
            if(currentLat && currentLng) map.setView([currentLat, currentLng], 18);
        };
    </script>
</body>
</html>
