<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CodeWave</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body {
            background-color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 350px;
            background: linear-gradient(180deg, #ffc0cb 0%, #ff69b4 40%, #ff1493 100%);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
            padding-bottom: 30px;
            height: 720px; /* Thodi height vadhavli aahe inputs mule */
        }

        .header-wave {
            height: 180px;
            background: #ffd1dc;
            clip-path: polygon(0 0, 100% 0, 100% 65%, 0% 100%);
            margin-bottom: -30px;
        }

        .content { padding: 30px; color: white; }

        h2 { font-size: 32px; margin-bottom: 20px; font-weight: 600; }

        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 13px; margin-bottom: 5px; opacity: 0.9; }
        
        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: white;
            color: #333;
            outline: none;
        }

        .footer-action {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
        }

        .reg-link { font-size: 13px; text-decoration: none; color: white; }
        .reg-link b { cursor: pointer; }

        .btn-register {
            background: white;
            color: #ff85a2;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .btn-register:hover { opacity: 0.9; transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="card">
        <div class="header-wave"></div>
        <div class="content">
            <h2>Register</h2>
            
            <form id="registerForm">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="fullName" placeholder="Enter your name" required>
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="footer-action">
                    <a href="login.html" class="reg-link">Already have an account? <b>Login</b></a>
                    <button type="submit" class="btn-register">Sign Up</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBBecl7Q3CN8K-lh3booKDNKDj-iA5BN6w",
            authDomain: "yash-a7421.firebaseapp.com",
            projectId: "yash-a7421",
            storageBucket: "yash-a7421.firebasestorage.app",
            messagingSenderId: "163386398931",
            appId: "1:163386398931:web:f686bc5041ea76a18b1c26",
            measurementId: "G-ZZLJ5HNXWD"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const registerForm = document.getElementById('registerForm');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // 1. Firebase Auth ne user create kara
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. Firestore madhe user chi mahiti save kara
                await setDoc(doc(db, "users", user.uid), {
                    name: fullName,
                    email: email,
                    createdAt: new Date().toISOString()
                });

                alert("Registration Successful!");
                window.location.href = "login.html"; // Login page var pathva

            } catch (error) {
                let errorMessage = "Registration Failed";
                if(error.code === 'auth/email-already-in-use') errorMessage = "Email already registered.";
                if(error.code === 'auth/weak-password') errorMessage = "Password should be at least 6 characters.";
                
                alert(errorMessage + " (" + error.message + ")");
            }
        });
    </script>
</body>
</html>
